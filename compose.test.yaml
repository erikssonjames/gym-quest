services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gym_quest_test
      POSTGRES_USER: gym_quest_test
      POSTGRES_PASSWORD: gym_quest_test
    ports:
      - "${GYM_QUEST_TEST_DB_PORT:-55433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_quest_test -d gym_quest_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
    stop_grace_period: 5s
