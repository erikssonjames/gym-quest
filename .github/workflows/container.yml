name: Container

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: |
          short_sha="${GITHUB_SHA::7}"
          package_version="$(node -p "require('./package.json').version")"
          echo "tag=main-$(date +%s)-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}+${short_sha}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.image.outputs.version }}
          tags: |
            ghcr.io/erikssonjames/gym-quest:${{ steps.image.outputs.tag }}
            ghcr.io/erikssonjames/gym-quest:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
