name: Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Typecheck, unit, and component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  integration:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gym_quest_test
          POSTGRES_USER: gym_quest_test
          POSTGRES_PASSWORD: gym_quest_test
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U gym_quest_test -d gym_quest_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:integration
        env:
          TEST_DATABASE_URL: postgres://gym_quest_test:gym_quest_test@127.0.0.1:55433/gym_quest_test

  e2e:
    name: Playwright Chromium
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gym_quest_test
          POSTGRES_USER: gym_quest_test
          POSTGRES_PASSWORD: gym_quest_test
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U gym_quest_test -d gym_quest_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          TEST_DATABASE_URL: postgres://gym_quest_test:gym_quest_test@127.0.0.1:55433/gym_quest_test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
